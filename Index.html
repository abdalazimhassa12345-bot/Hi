<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملاحظات سحابية</title>
    <!-- استدعاء مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        input { width: 70%; padding: 8px; }
        button { padding: 8px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #eee; margin-bottom: 5px; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ملاحظاتي السحابية</h2>
    <input type="text" id="noteInput" placeholder="أدخل ملاحظة جديدة...">
    <button onclick="saveNote()">حفظ</button>
    <ul id="notesList"></ul>
</div>

<script>
    // 1. ضع هنا بيانات مشروعك من Firebase Console
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    // 2. تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 3. وظيفة الحفظ في السحابة
    function saveNote() {
        const input = document.getElementById("noteInput");
        if (input.value.trim() !== "") {
            database.ref('notes/').push({
                text: input.value,
                timestamp: Date.now()
            });
            input.value = '';
        }
    }

    // 4. جلب الملاحظات لحظياً (أي إضافة تظهر فوراً للجميع)
    database.ref('notes/').on('value', (snapshot) => {
        const list = document.getElementById("notesList");
        list.innerHTML = ''; 
        snapshot.forEach((childSnapshot) => {
            const note = childSnapshot.val();
            const li = document.createElement("li");
            li.textContent = note.text;
            list.appendChild(li);
        });
    });
</script>

</body>
</html>
